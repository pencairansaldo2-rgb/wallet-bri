<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wallet</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

/* BACKGROUND FIX */
body{
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('bg.jpg') no-repeat center center/cover;
    color:white;
}

/* LOGO */
.logo{
    width:90px;
    display:block;
    margin:0 auto 15px;
}

.logo-small{
    width:28px;
    margin-right:8px;
}

/* LOGIN */
#login{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:90%;
    max-width:350px;
    background:rgba(17,28,51,0.8);
    padding:25px;
    border-radius:20px;
    text-align:center;
}

.login-box input{
    width:100%;
    padding:14px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    background:#0b1220;
    color:white;
}

.login-box button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-weight:bold;
}

/* DASHBOARD */
#dashboard{display:none;}

.header{
    padding:20px;
    display:flex;
    align-items:center;
    font-weight:bold;
}

.balance-card{
    margin:15px;
    padding:20px;
    border-radius:20px;
    background:#3b82f6;
}

.balance{
    font-size:30px;
    font-weight:bold;
    margin-top:10px;
}

.menu{
    display:flex;
    gap:10px;
    padding:15px;
}

.menu button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    color:white;
    font-weight:bold;
}

.topup{background:#22c55e;}
.withdraw{background:#ef4444;}

.box{
    margin:15px;
    padding:15px;
    background:rgba(17,28,51,0.8);
    border-radius:15px;
    display:none;
}

.box input{
    width:100%;
    padding:12px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    background:#0b1220;
    color:white;
}

.wa button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#25D366;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <div class="login-box">
        <img src="logo.png" class="logo">
        <h2>Masuk</h2>
        <input type="text" id="idInput" placeholder="ID">
        <input type="password" id="passInput" placeholder="Kata Sandi">
        <button onclick="login()">Masuk</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="header">
    <img src="logo.png" class="logo-small">
    My Wallet
</div>

<div class="balance-card">
    <div>Saldo</div>
    <div class="balance">RM <span id="saldo">0.00</span></div>
    <div id="userInfo"></div>
</div>

<div class="menu">
    <button class="topup" onclick="showTopup()">Top Up</button>
    <button class="withdraw" onclick="showWithdraw()">Tarik Dana</button>
</div>

<!-- TOPUP -->
<div class="box" id="topupBox">
    <p><b>Transfer ke Admin</b></p>
    <p>Bank: BRI</p>
    <p>No Rek: 330501007338502</p>
    <p>Nama: Didik Sulistyo</p>

    <p>Jumlah: RM <span id="nominal">0.00</span></p>
    <input type="number" id="jumlah" placeholder="Masukkan jumlah">

    <div class="wa">
        <a id="waTopup" target="_blank">
            <button>WhatsApp Admin</button>
        </a>
    </div>
</div>

<!-- WITHDRAW -->
<div class="box" id="withdrawBox">
    <input type="number" id="wdJumlah" placeholder="Jumlah">
    <input type="text" id="wdBank" placeholder="Nama Bank">
    <input type="text" id="wdRek" placeholder="No Rekening">
    <input type="text" id="wdNama" placeholder="Nama Pemilik">

    <button onclick="submitWithdraw()">Kirim</button>
</div>

</div>

<script>

const noAdmin = "6287837571429";

const users = [
    {id:"BRI581", password:"ATOKABAH77", nama:"Zainuddi bin Hasan", saldo:100000}
];

let currentUser = null;

function login(){
    const id = idInput.value;
    const pass = passInput.value;

    const user = users.find(u => u.id === id && u.password === pass);

    if(!user){
        alert("Login gagal");
        return;
    }

    currentUser = user;
    login.style.display="none";
    dashboard.style.display="block";

    userInfo.innerText = user.nama + " (" + user.id + ")";
    updateSaldo();
}

/* FORMAT RM 100.000.00 */
function formatRM(x){
    return Number(x)
    .toLocaleString("ms-MY",{minimumFractionDigits:2})
    .replace(/,/g,".");
}

function updateSaldo(){
    saldo.innerText = formatRM(currentUser.saldo);
}

function showTopup(){
    topupBox.style.display="block";
    withdrawBox.style.display="none";
}

jumlah.oninput=function(){
    nominal.innerText = formatRM(jumlah.value);

    let msg = `Top Up RM ${formatRM(jumlah.value)}
ID: ${currentUser.id}
Nama: ${currentUser.nama}`;

    waTopup.href = `https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`;
}

function showWithdraw(){
    withdrawBox.style.display="block";
    topupBox.style.display="none";
}

function submitWithdraw(){
    let j = wdJumlah.value;
    let b = wdBank.value;
    let r = wdRek.value;
    let n = wdNama.value;

    if(!j || !b || !r || !n){
        alert("Lengkapi data!");
        return;
    }

    let msg = `Withdraw RM ${formatRM(j)}
ID: ${currentUser.id}
Nama: ${currentUser.nama}
Bank: ${b}
Rek: ${r}
Nama: ${n}`;

    window.open(`https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
