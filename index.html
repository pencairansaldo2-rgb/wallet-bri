<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo Wallet</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui, sans-serif;
}

body{
    background: linear-gradient(160deg,#071a2f,#0b2a4a,#06121f);
    color:white;
}

/* LOGIN */
#loginPage{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login{
    width:90%;
    max-width:360px;
    background:rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
    text-align:center;
}

.login img{
    width:70px;
    margin-bottom:10px;
}

.login h2{margin-bottom:10px;}

.login input{
    width:100%;
    padding:14px;
    margin:8px 0;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.1);
    color:white;
}

.login button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#3b82f6;
    color:white;
    font-weight:bold;
}

/* APP */
#app{display:none;}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    padding:18px;
    align-items:center;
}

.brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:bold;
}

.brand img{
    width:32px;
    height:32px;
    border-radius:8px;
}

/* SALDO CARD */
.card{
    margin:15px;
    padding:20px;
    border-radius:20px;
    background:linear-gradient(135deg,rgba(59,130,246,0.8),rgba(29,78,216,0.8));
    backdrop-filter: blur(10px);
}

.balance{
    font-size:32px;
    font-weight:bold;
    margin-top:5px;
}

/* ACTION */
.actions{
    display:flex;
    justify-content:space-around;
    margin:15px;
}

.action{
    text-align:center;
    font-size:12px;
}

.circle{
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:5px;
    background:rgba(255,255,255,0.08);
    overflow:hidden;
}

.circle img{
    width:30px;
}

/* BOX */
.box{
    margin:15px;
    padding:15px;
    background:rgba(255,255,255,0.06);
    border-radius:15px;
    display:none;
}

input{
    width:100%;
    padding:12px;
    margin:6px 0;
    border-radius:10px;
    border:none;
    background:rgba(255,255,255,0.08);
    color:white;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    font-weight:bold;
    margin-top:8px;
}

/* HISTORY */
.history{
    margin:15px;
}

.tx{
    background:rgba(255,255,255,0.05);
    padding:12px;
    border-radius:12px;
    margin-top:8px;
    font-size:13px;
}

/* NAV */
.nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:rgba(0,0,0,0.4);
    padding:12px 0;
    backdrop-filter: blur(10px);
}

.nav img{
    width:22px;
    display:block;
    margin:auto;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="login">
        <img src="./logo.png">
        <h2>Neo Wallet</h2>
        <input id="id" placeholder="ID">
        <input id="pw" type="password" placeholder="Password">
        <button onclick="login()">Masuk</button>
    </div>
</div>

<!-- APP -->
<div id="app">

<div class="header">
    <div class="brand">
        <img src="./logo.png">
        Neo Wallet
    </div>
</div>

<div class="card">
    <div>Saldo Tersedia</div>
    <div class="balance">RM <span id="saldo">0.00</span></div>
</div>

<div class="actions">

    <div class="action" onclick="show('topup')">
        <div class="circle">
            <img src="./logo.png">
        </div>
        Top Up
    </div>

    <div class="action" onclick="show('wd')">
        <div class="circle">
            <img src="./logo.png">
        </div>
        Tarik
    </div>

    <div class="action">
        <div class="circle">
            <img src="./logo.png">
        </div>
        Akun
    </div>

</div>

<div class="box" id="topup">
    <input id="tamount" placeholder="Jumlah">
    <button class="btn" onclick="topup()">Top Up</button>
</div>

<div class="box" id="wd">
    <input id="wamount" placeholder="Jumlah">
    <input id="bank" placeholder="Bank">
    <input id="rek" placeholder="No Rekening">
    <input id="nama" placeholder="Nama">
    <button class="btn" onclick="withdraw()">Withdraw</button>
</div>

<div class="history">
    <h4>Riwayat</h4>
    <div id="log"></div>
</div>

<div class="nav">
    <div>
        <img src="./logo.png">
        Home
    </div>
    <div>
        <img src="./logo.png">
        Wallet
    </div>
    <div>
        <img src="./logo.png">
        Akun
    </div>
</div>

</div>

<script>

const admin="6287837571429";

let user={
    id:"BRI581",
    pass:"ATOKABAH77",
    nama:"Zainuddi bin Hasan",
    saldo:100000
};

function login(){
    let id=document.getElementById("id").value;
    let pw=document.getElementById("pw").value;

    if(id==user.id && pw==user.pass){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("app").style.display="block";
        document.getElementById("saldo").innerText=
        Number(user.saldo).toLocaleString("ms-MY",{minimumFractionDigits:2});
    }else{
        alert("Login gagal");
    }
}

function show(x){
    document.getElementById("topup").style.display="none";
    document.getElementById("wd").style.display="none";
    document.getElementById(x).style.display="block";
}

function log(t){
    let d=document.createElement("div");
    d.className="tx";
    d.innerText=t;
    document.getElementById("log").prepend(d);
}

function topup(){
    let j=document.getElementById("tamount").value;

    let msg=`TOP UP\nID:${user.id}\nJumlah RM ${j}`;
    window.location=`https://wa.me/${admin}?text=${encodeURIComponent(msg)}`;

    log("Topup RM "+j);
}

function withdraw(){
    let j=document.getElementById("wamount").value;
    let bank=document.getElementById("bank").value;
    let rek=document.getElementById("rek").value;
    let nama=document.getElementById("nama").value;

    let msg=`WITHDRAW\nID:${user.id}\nNama:${nama}\nBank:${bank}\nRek:${rek}\nRM ${j}`;
    window.location=`https://wa.me/${admin}?text=${encodeURIComponent(msg)}`;

    log("Withdraw RM "+j);
}

</script>

</body>
</html>
