<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wallet</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:url('bg.jpg') no-repeat center center/cover;
    color:white;
}

body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    top:0;
    left:0;
    z-index:-1;
}

.logo{
    width:90px;
    display:block;
    margin:0 auto 15px;
    object-fit:contain;
    filter:drop-shadow(0 5px 10px rgba(0,0,0,0.5));
}

.logo-small{
    width:28px;
    margin-right:8px;
}

/* LOGIN */
#login{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    padding:20px;
}

.login-box{
    width:100%;
    max-width:350px;
    background:rgba(17,28,51,0.7);
    backdrop-filter:blur(10px);
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    text-align:center;
}

.login-box input{
    width:100%;
    padding:14px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    background:#0b1220;
    color:white;
}

.login-box button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#3b82f6,#60a5fa);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* DASHBOARD */
#dashboard{display:none;}

.header{
    padding:20px;
    font-size:20px;
    font-weight:bold;
    display:flex;
    align-items:center;
}

.balance-card{
    margin:15px;
    padding:20px;
    border-radius:20px;
    background:linear-gradient(135deg,#3b82f6,#60a5fa);
}

.balance{
    font-size:30px;
    margin-top:10px;
    font-weight:bold;
}

.user{
    font-size:13px;
    opacity:0.8;
    margin-top:5px;
}

.menu{
    display:flex;
    gap:10px;
    padding:15px;
}

.menu button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    font-weight:bold;
    color:white;
    cursor:pointer;
}

.topup{background:#22c55e;}
.withdraw{background:#ef4444;}

.box{
    margin:15px;
    padding:15px;
    background:rgba(17,28,51,0.7);
    backdrop-filter:blur(10px);
    border-radius:15px;
    display:none;
}

.box input{
    width:100%;
    padding:12px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    background:#0b1220;
    color:white;
}

.wa button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#25D366;
    margin-top:10px;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="login">
    <div class="login-box">
        <img src="logo.png" class="logo">
        <h2>Masuk</h2>
        <input type="text" id="idInput" placeholder="ID">
        <input type="password" id="passInput" placeholder="Kata Sandi">
        <button onclick="login()">Masuk</button>
    </div>
</div>

<div id="dashboard">

<div class="header">
    <img src="logo.png" class="logo-small">
    My Wallet
</div>

<div class="balance-card">
    <div>Saldo</div>
    <div class="balance">RM <span id="saldo">0.00</span></div>
    <div class="user" id="userInfo"></div>
</div>

<div class="menu">
    <button class="topup" onclick="showTopup()">Top Up</button>
    <button class="withdraw" onclick="showWithdraw()">Tarik Dana</button>
</div>

<div class="box" id="topupBox">
    <p><b>Transfer ke Admin</b></p>
    <p>Bank: BRI</p>
    <p>No Rek: 330501007338502</p>
    <p>Nama: Didik Sulistyo</p>

    <p style="margin-top:10px;">Jumlah: RM <span id="nominal">0.00</span></p>
    <input type="number" id="jumlah" placeholder="Masukkan jumlah">

    <div class="wa">
        <a id="waTopup" target="_blank">
            <button>Hubungi Admin (WhatsApp)</button>
        </a>
    </div>
</div>

<div class="box" id="withdrawBox">
    <input type="number" id="wdJumlah" placeholder="Jumlah">
    <input type="text" id="wdBank" placeholder="Nama Bank">
    <input type="text" id="wdRek" placeholder="No Rekening">
    <input type="text" id="wdNama" placeholder="Nama Pemilik">

    <div class="wa">
        <button onclick="submitWithdraw()">Kirim Permintaan</button>
    </div>
</div>

</div>

<script>

const noAdmin = "6287837571429";

const users = [
    {id:"BRI581", password:"ATOKABAH77", nama:"Zainuddi bin Hasan", saldo:100000}
];

let currentUser = null;

const loginBox = document.getElementById("login");
const dashboard = document.getElementById("dashboard");

const idInput = document.getElementById("idInput");
const passInput = document.getElementById("passInput");

const saldoEl = document.getElementById("saldo");
const userInfo = document.getElementById("userInfo");

const topupBox = document.getElementById("topupBox");
const withdrawBox = document.getElementById("withdrawBox");

const jumlah = document.getElementById("jumlah");
const nominal = document.getElementById("nominal");

const waTopup = document.getElementById("waTopup");

function login(){
    const id = idInput.value;
    const pass = passInput.value;

    const user = users.find(u => u.id === id && u.password === pass);

    if(!user){
        alert("Login gagal");
        return;
    }

    currentUser = user;

    loginBox.style.display = "none";
    dashboard.style.display = "block";

    userInfo.innerText = `${user.nama} (${user.id})`;
    updateSaldo();
}

function formatRM(x){
    return Number(x || 0)
        .toLocaleString("ms-MY", {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        })
        .replace(/,/g, ".");
}

function updateSaldo(){
    saldoEl.innerText = formatRM(currentUser.saldo);
}

function showTopup(){
    topupBox.style.display = "block";
    withdrawBox.style.display = "none";
}

jumlah.addEventListener("input", function(){
    nominal.innerText = formatRM(jumlah.value);

    const msg = `Halo admin,
Saya ingin top up RM ${formatRM(jumlah.value)}

ID: ${currentUser.id}
Nama: ${currentUser.nama}`;

    waTopup.href = `https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`;
});

function showWithdraw(){
    withdrawBox.style.display = "block";
    topupBox.style.display = "none";
}

function submitWithdraw(){
    const j = document.getElementById("wdJumlah").value;
    const b = document.getElementById("wdBank").value;
    const r = document.getElementById("wdRek").value;
    const n = document.getElementById("wdNama").value;

    if(!j || !b || !r || !n){
        alert("Isi semua data!");
        return;
    }

    const msg = `Halo admin,
Permintaan tarik dana

ID: ${currentUser.id}
Nama: ${currentUser.nama}

Jumlah: RM ${formatRM(j)}
Bank: ${b}
Rekening: ${r}
Nama: ${n}`;

    window.open(`https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
