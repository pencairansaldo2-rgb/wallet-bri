<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wallet</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    background: linear-gradient(rgba(0,20,60,0.8), rgba(0,20,60,0.9)),
                url('./bg.jpg') no-repeat center/cover;
    color:white;
}

/* LOGIN */
#loginPage{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:90%;
    max-width:350px;
    background:rgba(0,30,80,0.95);
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.logo{
    width:80px;
    margin-bottom:15px;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
}

input{
    width:100%;
    padding:14px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    background:#081a33;
    color:white;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

/* DASHBOARD */
#dashboard{display:none;padding-bottom:70px;}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    gap:12px;
    padding:15px;
}

.logo-box{
    width:45px;
    height:45px;
    background:#0b5ed7;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.logo-box img{
    width:30px;
}

/* TITLE */
.title{
    font-size:18px;
    font-weight:bold;
}

/* SALDO */
.saldo-card{
    margin:15px;
    padding:20px;
    border-radius:20px;
    background:linear-gradient(135deg,#1d4ed8,#2563eb);
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.saldo{
    font-size:30px;
    font-weight:bold;
    margin-top:5px;
}

/* MENU */
.menu{
    display:flex;
    gap:10px;
    padding:15px;
}

.topup{background:#22c55e;color:white;}
.withdraw{background:#ef4444;color:white;}

/* BOX */
.box{
    margin:15px;
    padding:15px;
    background:rgba(0,30,80,0.9);
    border-radius:15px;
    display:none;
}

.wa{background:#25D366;color:white;}

/* NAV */
.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    justify-content:space-around;
    background:#081a33;
    padding:10px 0;
    font-size:12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="login-box">
        <img src="./logo.png" class="logo" onerror="this.src='https://via.placeholder.com/80?text=LOGO'">
        <h2>Masuk</h2>
        <input type="text" id="idInput" placeholder="ID">
        <input type="password" id="passInput" placeholder="Kata Sandi">
        <button onclick="login()" style="background:#3b82f6;color:white;">Masuk</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="header">
    <div class="logo-box">
        <img src="./logo.png">
    </div>
    <div class="title">My Wallet</div>
</div>

<div class="saldo-card">
    <div>Saldo</div>
    <div class="saldo">RM <span id="saldo">0.00</span></div>
    <div id="userInfo"></div>
</div>

<div class="menu">
    <button class="topup" onclick="showTopup()">Top Up</button>
    <button class="withdraw" onclick="showWithdraw()">Tarik Dana</button>
</div>

<!-- TOPUP -->
<div class="box" id="topupBox">
    <p><b>Transfer ke Admin</b></p>
    <p>Bank: BRI</p>
    <p>No Rek: 330501007338502</p>
    <p>Nama: Didik Sulistyo</p>

    <input type="number" id="jumlah" placeholder="Masukkan jumlah">
    <button class="wa" onclick="kirimTopup()">WhatsApp Admin</button>
</div>

<!-- WITHDRAW -->
<div class="box" id="withdrawBox">
    <input type="number" id="wdJumlah" placeholder="Jumlah">
    <input type="text" id="wdBank" placeholder="Nama Bank">
    <input type="text" id="wdRek" placeholder="No Rekening">
    <input type="text" id="wdNama" placeholder="Nama Pemilik">
    <button class="withdraw" onclick="withdraw()">Kirim</button>
</div>

<div class="bottom-nav">
    <div>🏠<p>Home</p></div>
    <div>💳<p>Wallet</p></div>
    <div>👤<p>Akun</p></div>
</div>

</div>

<script>

const noAdmin = "6287837571429";

const user = {
    id:"BRI581",
    pass:"ATOKABAH77",
    nama:"Zainuddi bin Hasan",
    saldo:100000
};

function formatRM(x){
    return Number(x || 0).toLocaleString("ms-MY",{minimumFractionDigits:2}).replace(/,/g,".");
}

function login(){
    let id = document.getElementById("idInput").value.trim();
    let pass = document.getElementById("passInput").value.trim();

    if(id===user.id && pass===user.pass){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("dashboard").style.display="block";

        document.getElementById("userInfo").innerText =
            user.nama + " ("+user.id+")";

        document.getElementById("saldo").innerText =
            formatRM(user.saldo);
    }else{
        alert("Login gagal!");
    }
}

function showTopup(){
    document.getElementById("topupBox").style.display="block";
    document.getElementById("withdrawBox").style.display="none";
}

function showWithdraw(){
    document.getElementById("withdrawBox").style.display="block";
    document.getElementById("topupBox").style.display="none";
}

function kirimTopup(){
    let j = document.getElementById("jumlah").value;

    if(j<=0) return alert("Isi jumlah!");

    let msg = `Top Up\nJumlah: RM ${formatRM(j)}\nID:${user.id}`;
    window.location.href=`https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`;
}

function withdraw(){
    let j = document.getElementById("wdJumlah").value;

    if(j<=0) return alert("Isi jumlah!");

    let msg = `Withdraw\nJumlah: RM ${formatRM(j)}\nNama:${document.getElementById("wdNama").value}`;
    window.location.href=`https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`;
}

</script>

</body>
</html>
