<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wallet Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                url('bg.jpg') no-repeat center/cover;
    color:white;
}

/* LOGIN */
#loginPage{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:90%;
    max-width:350px;
    background:rgba(17,28,51,0.95);
    padding:25px;
    border-radius:20px;
    text-align:center;
}

.logo{width:80px;margin-bottom:15px;}

input{
    width:100%;
    padding:14px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    background:#0b1220;
    color:white;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

/* DASHBOARD */
#dashboard{display:none;}

.header{padding:20px;font-size:18px;font-weight:bold;}

.balance-card{
    margin:15px;
    padding:20px;
    border-radius:20px;
    background:linear-gradient(135deg,#3b82f6,#1d4ed8);
}

.balance{font-size:32px;font-weight:bold;}

.menu{display:flex;gap:10px;padding:15px;}

.topup{background:#22c55e;}
.withdraw{background:#ef4444;}

.box{
    margin:15px;
    padding:15px;
    background:rgba(17,28,51,0.9);
    border-radius:15px;
    display:none;
}

.wa button{background:#25D366;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="login-box">
        <img src="logo.png" class="logo">
        <h2>Masuk</h2>
        <input type="text" id="idInput" placeholder="ID">
        <input type="password" id="passInput" placeholder="Kata Sandi">
        <button onclick="doLogin()" style="background:#3b82f6;color:white;">Masuk</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="header">My Wallet Premium</div>

<div class="balance-card">
    <div>Saldo</div>
    <div class="balance">RM <span id="saldo">0.00</span></div>
    <div id="userInfo"></div>
</div>

<div class="menu">
    <button class="topup" onclick="showTopup()">Top Up</button>
    <button class="withdraw" onclick="showWithdraw()">Tarik Dana</button>
</div>

<!-- TOPUP -->
<div class="box" id="topupBox">
    <p><b>Transfer ke Admin</b></p>
    <p>Bank: BRI</p>
    <p>No Rek: 330501007338502</p>
    <p>Nama: Didik Sulistyo</p>

    <p>Jumlah: RM <span id="nominal">0.00</span></p>
    <input type="number" id="jumlah" placeholder="Masukkan jumlah">

    <div class="wa">
        <button onclick="kirimTopup()">WhatsApp Admin</button>
    </div>
</div>

<!-- WITHDRAW -->
<div class="box" id="withdrawBox">
    <input type="number" id="wdJumlah" placeholder="Jumlah">
    <input type="text" id="wdBank" placeholder="Nama Bank">
    <input type="text" id="wdRek" placeholder="No Rekening">
    <input type="text" id="wdNama" placeholder="Nama Pemilik">
    <button onclick="submitWithdraw()" style="background:#ef4444;color:white;">Kirim</button>
</div>

</div>

<script>

const noAdmin = "6287837571429";

const users = [
    {id:"BRI581", password:"ATOKABAH77", nama:"Zainuddi bin Hasan", saldo:100000}
];

let currentUser = null;

/* FORMAT RM */
function formatRM(x){
    return Number(x || 0)
    .toLocaleString("ms-MY",{minimumFractionDigits:2})
    .replace(/,/g,".");
}

/* LOGIN */
function doLogin(){
    const id = document.getElementById("idInput").value.trim();
    const pass = document.getElementById("passInput").value.trim();

    if(!id || !pass){
        alert("Isi ID dan Password!");
        return;
    }

    const user = users.find(u => u.id === id && u.password === pass);

    if(!user){
        alert("ID atau password salah!");
        return;
    }

    currentUser = user;

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    document.getElementById("userInfo").innerText =
        `${user.nama} (${user.id})`;

    updateSaldo();
}

/* SALDO */
function updateSaldo(){
    if(!currentUser) return;

    document.getElementById("saldo").innerText =
        formatRM(currentUser.saldo);
}

/* MENU */
function showTopup(){
    document.getElementById("topupBox").style.display = "block";
    document.getElementById("withdrawBox").style.display = "none";
}

function showWithdraw(){
    document.getElementById("withdrawBox").style.display = "block";
    document.getElementById("topupBox").style.display = "none";
}

/* TOPUP */
function kirimTopup(){
    const jumlah = Number(document.getElementById("jumlah").value);

    if(jumlah <= 0){
        alert("Jumlah tidak valid!");
        return;
    }

    const msg = `*Top Up*
Jumlah: RM ${formatRM(jumlah)}
ID: ${currentUser.id}
Nama: ${currentUser.nama}`;

    window.location.href =
        `https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`;
}

/* LOAD AMAN */
window.onload = function(){
    const jumlahInput = document.getElementById("jumlah");

    jumlahInput.addEventListener("input", function(){
        document.getElementById("nominal").innerText =
            formatRM(this.value);
    });
};

/* WITHDRAW */
function submitWithdraw(){
    const j = Number(document.getElementById("wdJumlah").value);
    const bank = document.getElementById("wdBank").value;
    const rek = document.getElementById("wdRek").value;
    const nama = document.getElementById("wdNama").value;

    if(j <= 0 || !bank || !rek || !nama){
        alert("Lengkapi data!");
        return;
    }

    const msg = `*Withdraw*

Jumlah: RM ${formatRM(j)}
ID: ${currentUser.id}
Nama: ${currentUser.nama}

Bank: ${bank}
Rek: ${rek}
Nama: ${nama}`;

    window.location.href =
        `https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`;
}

</script>

</body>
</html>
