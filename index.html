<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wallet</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                url('bg.jpg') no-repeat center center/cover;
    color:white;
}

/* LOGIN */
#login{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:90%;
    max-width:350px;
    background:rgba(17,28,51,0.85);
    padding:25px;
    border-radius:20px;
    text-align:center;
}

.logo{
    width:90px;
    margin-bottom:15px;
}

.login-box input{
    width:100%;
    padding:14px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    background:#0b1220;
    color:white;
}

.login-box button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:white;
    font-weight:bold;
}

/* DASHBOARD */
#dashboard{display:none;}

.header{
    padding:20px;
    display:flex;
    align-items:center;
    font-weight:bold;
}

.balance-card{
    margin:15px;
    padding:20px;
    border-radius:20px;
    background:#3b82f6;
}

.balance{
    font-size:30px;
    font-weight:bold;
    margin-top:10px;
}

.menu{
    display:flex;
    gap:10px;
    padding:15px;
}

.menu button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:15px;
    color:white;
    font-weight:bold;
}

.topup{background:#22c55e;}
.withdraw{background:#ef4444;}

.box{
    margin:15px;
    padding:15px;
    background:rgba(17,28,51,0.85);
    border-radius:15px;
    display:none;
}

.box input{
    width:100%;
    padding:12px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    background:#0b1220;
    color:white;
}

.wa button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#25D366;
    margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <div class="login-box">
        <img src="logo.png" class="logo">
        <h2>Masuk</h2>
        <input type="text" id="idInput" placeholder="ID">
        <input type="password" id="passInput" placeholder="Kata Sandi">
        <button onclick="login()">Masuk</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="header">
    My Wallet
</div>

<div class="balance-card">
    <div>Saldo</div>
    <div class="balance">RM <span id="saldo">0.00</span></div>
    <div id="userInfo"></div>
</div>

<div class="menu">
    <button class="topup" onclick="showTopup()">Top Up</button>
    <button class="withdraw" onclick="showWithdraw()">Tarik Dana</button>
</div>

<!-- TOPUP -->
<div class="box" id="topupBox">
    <p><b>Transfer ke Admin</b></p>
    <p>Bank: BRI</p>
    <p>No Rek: 330501007338502</p>
    <p>Nama: Didik Sulistyo</p>

    <p>Jumlah: RM <span id="nominal">0.00</span></p>
    <input type="number" id="jumlah" placeholder="Masukkan jumlah">

    <div class="wa">
        <button onclick="kirimTopup()">WhatsApp Admin</button>
    </div>
</div>

<!-- WITHDRAW -->
<div class="box" id="withdrawBox">
    <input type="number" id="wdJumlah" placeholder="Jumlah">
    <input type="text" id="wdBank" placeholder="Nama Bank">
    <input type="text" id="wdRek" placeholder="No Rekening">
    <input type="text" id="wdNama" placeholder="Nama Pemilik">

    <button onclick="submitWithdraw()">Kirim</button>
</div>

</div>

<script>

const noAdmin = "6287837571429";

const users = [
    {id:"BRI581", password:"ATOKABAH77", nama:"Zainuddi bin Hasan", saldo:100000}
];

let currentUser = null;

/* FORMAT RM 100.000.00 */
function formatRM(x){
    return Number(x)
    .toLocaleString("ms-MY",{minimumFractionDigits:2})
    .replace(/,/g,".");
}

/* LOGIN */
function login(){
    const id = document.getElementById("idInput").value;
    const pass = document.getElementById("passInput").value;

    const user = users.find(u => u.id === id && u.password === pass);

    if(!user){
        alert("Login gagal");
        return;
    }

    currentUser = user;

    document.getElementById("login").style.display = "none";
    document.getElementById("dashboard").style.display = "block";

    document.getElementById("userInfo").innerText =
        user.nama + " (" + user.id + ")";

    updateSaldo();
}

/* SALDO */
function updateSaldo(){
    document.getElementById("saldo").innerText =
        formatRM(currentUser.saldo);
}

/* MENU */
function showTopup(){
    document.getElementById("topupBox").style.display = "block";
    document.getElementById("withdrawBox").style.display = "none";
}

function showWithdraw(){
    document.getElementById("withdrawBox").style.display = "block";
    document.getElementById("topupBox").style.display = "none";
}

/* TOPUP */
function kirimTopup(){
    const jumlah = document.getElementById("jumlah").value;

    if(!jumlah){
        alert("Masukkan jumlah!");
        return;
    }

    const msg = `Top Up RM ${formatRM(jumlah)}
ID: ${currentUser.id}
Nama: ${currentUser.nama}`;

    window.location.href =
        `https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`;
}

/* LIVE NOMINAL */
document.getElementById("jumlah").addEventListener("input", function(){
    document.getElementById("nominal").innerText =
        formatRM(this.value);
});

/* WITHDRAW */
function submitWithdraw(){
    const j = document.getElementById("wdJumlah").value;
    const b = document.getElementById("wdBank").value;
    const r = document.getElementById("wdRek").value;
    const n = document.getElementById("wdNama").value;

    if(!j || !b || !r || !n){
        alert("Lengkapi data!");
        return;
    }

    const msg = `Withdraw RM ${formatRM(j)}
ID: ${currentUser.id}
Nama: ${currentUser.nama}
Bank: ${b}
Rek: ${r}
Nama: ${n}`;

    window.location.href =
        `https://wa.me/${noAdmin}?text=${encodeURIComponent(msg)}`;
}

</script>

</body>
</html>
